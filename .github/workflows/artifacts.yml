name: Build Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-amd64:
    name: Linux amd64
    runs-on: ubuntu-latest

    env:
      GOOS: linux
      GOARCH: amd64
      SING_BOX_REVISION: v1.13.13
      SING_BOX_TAGS: with_gvisor,with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,badlinkname,tfogo_checklinkname0,with_v2ray_api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi
          echo "sing_box=${SING_BOX_REVISION}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Build embedded web UI
        run: npm --prefix web run build

      - name: Build BoxFleet binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/artifacts
          ldflags="-s -w -X main.version=${{ steps.version.outputs.value }}"
          boxfleet_version="${{ steps.version.outputs.value }}"
          CGO_ENABLED=1 go build -trimpath -ldflags "$ldflags" -o "dist/artifacts/bf-${boxfleet_version}-linux-amd64" ./cmd/bf
          CGO_ENABLED=1 go build -trimpath -ldflags "$ldflags" -o "dist/artifacts/boxfleet-server-${boxfleet_version}-linux-amd64" ./cmd/boxfleet-server
          CGO_ENABLED=0 go build -trimpath -ldflags "$ldflags" -o "dist/artifacts/boxfleet-agent-${boxfleet_version}-linux-amd64" ./cmd/boxfleet-agent

      - name: Build sing-box with V2Ray API
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none https://github.com/SagerNet/sing-box.git /tmp/sing-box
          git -C /tmp/sing-box checkout "$SING_BOX_REVISION"
          (
            cd /tmp/sing-box
            sing_box_ldflags="$(cat release/LDFLAGS)"
            CGO_ENABLED=0 go build -trimpath -tags "$SING_BOX_TAGS" -ldflags "$sing_box_ldflags" -o "$GITHUB_WORKSPACE/dist/artifacts/sing-box-${SING_BOX_REVISION}-linux-amd64" ./cmd/sing-box
          )
          "$GITHUB_WORKSPACE/dist/artifacts/sing-box-${SING_BOX_REVISION}-linux-amd64" version | grep with_v2ray_api

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          chmod 0755 dist/artifacts/*
          boxfleet_version="${{ steps.version.outputs.value }}"
          agent_name="boxfleet-agent-${boxfleet_version}-linux-amd64"
          sing_box_name="sing-box-${{ steps.version.outputs.sing_box }}-linux-amd64"
          agent_sha256="$(sha256sum "dist/artifacts/${agent_name}" | awk '{print $1}')"
          sing_box_sha256="$(sha256sum "dist/artifacts/${sing_box_name}" | awk '{print $1}')"
          agent_size="$(stat -c '%s' "dist/artifacts/${agent_name}")"
          sing_box_size="$(stat -c '%s' "dist/artifacts/${sing_box_name}")"
          jq -n \
            --arg release "$boxfleet_version" \
            --arg agent_version "$boxfleet_version" \
            --arg agent_name "$agent_name" \
            --arg agent_sha256 "$agent_sha256" \
            --argjson agent_size "$agent_size" \
            --arg sing_box_version "${{ steps.version.outputs.sing_box }}" \
            --arg sing_box_name "$sing_box_name" \
            --arg sing_box_sha256 "$sing_box_sha256" \
            --argjson sing_box_size "$sing_box_size" \
            '{
              release: $release,
              platforms: {
                "linux/amd64": {
                  agent: {
                    version: $agent_version,
                    name: $agent_name,
                    sha256: $agent_sha256,
                    size: $agent_size
                  },
                  sing_box: {
                    version: $sing_box_version,
                    name: $sing_box_name,
                    sha256: $sing_box_sha256,
                    size: $sing_box_size
                  }
                }
              }
            }' > dist/boxfleet-update.json
          tar -C dist/artifacts -czf "dist/boxfleet-${boxfleet_version}-linux-amd64.tar.gz" .
          (
            cd dist
            sha256sum "boxfleet-${boxfleet_version}-linux-amd64.tar.gz" boxfleet-update.json artifacts/* > SHA256SUMS
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: boxfleet-${{ steps.version.outputs.value }}-linux-amd64
          path: |
            dist/boxfleet-${{ steps.version.outputs.value }}-linux-amd64.tar.gz
            dist/SHA256SUMS
            dist/boxfleet-update.json
            dist/artifacts/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/boxfleet-${{ steps.version.outputs.value }}-linux-amd64.tar.gz \
            dist/SHA256SUMS \
            dist/boxfleet-update.json \
            dist/artifacts/bf-${{ steps.version.outputs.value }}-linux-amd64 \
            dist/artifacts/boxfleet-server-${{ steps.version.outputs.value }}-linux-amd64 \
            dist/artifacts/boxfleet-agent-${{ steps.version.outputs.value }}-linux-amd64 \
            dist/artifacts/sing-box-${{ steps.version.outputs.sing_box }}-linux-amd64 \
            --verify-tag \
            --generate-notes
